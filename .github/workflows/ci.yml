name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Lint + type + test gate ─────────────────────────────────────────────
  audit:
    name: audit (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      # Full history + tags: the release-provenance suite asserts against
      # `git tag` and `git rev-list <tag>..HEAD` — a shallow, tagless
      # checkout fails those tests even when the repo state is correct.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + train/dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[train,dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy train ablate serve eval release data

      - name: Pytest
        run: pytest -q --no-header

  # ── Coverage threshold gate ─────────────────────────────────────────────
  coverage:
    name: coverage (>=75% core modules)
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[train,dev]"

      - name: Coverage
        run: |
          pytest \
            --cov=train --cov=ablate --cov=serve \
            --cov=eval --cov=release --cov=data \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=75 \
            -q

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  # ── Lint commit messages (conventional commits) ────────────────────────
  conventional-commits:
    name: conventional-commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commit subjects
        env:
          PATTERN: '^(feat|fix|perf|test|docs|refactor|bench|ci)(\(.+\))?!?: .{1,72}$'
        run: |
          set -euo pipefail
          bad=0
          while IFS= read -r sha; do
            subject=$(git log -1 --format='%s' "$sha")
            if ! printf '%s\n' "$subject" | grep -qE "$PATTERN"; then
              printf '::error file=commit,title=invalid-subject::sha=%s subject=%s\n' "$sha" "$subject"
              bad=1
            fi
          done < <(git rev-list origin/main..HEAD --no-merges)
          if [ "$bad" -ne 0 ]; then
            printf '::error::one or more commit subjects violate Conventional Commits\n'
            exit 1
          fi
          printf 'all commit subjects OK\n'