version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies"]
    groups:
      python-minor:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "ci"]
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci(actions)"
      include: "scope"