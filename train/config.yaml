# DraftForge training config (sample).
#
# Override per run:
#   --seed N                       (training.seed)
#   --output-dir <path>            (output.dir)
#
# Invoke via:
#   accelerate launch --config_file train/ds_config.json \
#     -m train.train_eagle3 --config train/config.yaml --seed 42
#
# Pre-flight on rented GPU:
#   python -c "import torch; print(torch.cuda.is_available(), torch.cuda.get_device_name(0))"
# (Qwen3-4B-Instruct-2507 is open-weight; no HF token required.)

model:
  name_or_path: Qwen/Qwen3-4B-Instruct-2507
  torch_dtype: bfloat16
  attn_impl: sdpa

dataset:
  train_dir: artifacts/data/tokenized/train   # Phase 1 output
  val_dir: artifacts/data/tokenized/val
  max_length: 4096
  text_field: text

eagle3:
  layer_indices: [7, 18, 29]    # Qwen3-4B-Instruct-2507 has 36 layers;
                                # 7=low (~19%), 18=mid (50%), 29=high (~81%).
                                # Fractional depths preserve the EAGLE-3 paper's
                                # 40-layer [8,20,32] recipe (20%/50%/80%) via
                                # round(t × L). See train/layer_indices.py.
  num_decoder_layers: 1
  head_dim: null                # auto from target

optimizer:
  name: adamw
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1
  warmup_steps: 100

training:
  seed: 42
  max_steps: 2000
  per_device_batch_size: 1
  grad_accum: 8
  log_every: 10
  eval_every: 200
  save_every: 500
  bf16: true
  gradient_checkpointing: true
  training_time_test_every: 100
  training_time_test_horizon: 5
  # v1.3 sequence packing (cost-reduction lever 2). When enabled, short
  # tokenized docs are packed into ≤sequence_pack_max_len bins with
  # block-diagonal attention masks — recovers ~3-7× throughput on finance
  # traces where median doc length is 50-150 tokens.
  sequence_pack: false
  sequence_pack_max_len: 4096

ds:
  config_path: train/ds_config.json
  num_gpus: 1
  mixed_precision: bf16

output:
  dir: results/train/run1
  save_every: 500
  keep_last_n_checkpoints: 2
