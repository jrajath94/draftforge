# DraftForge data pipeline config (sample).
# Override --seed, --config, --skip-tokenize from CLI.
#
# Quick smoke test:
#   python -m data.prepare --config data/config.yaml --skip-tokenize
#
# Full run (Qwen3-4B-Instruct-2507 is open-weight, no HF token required):
#   python -m data.prepare --config data/config.yaml

seed: 42
output_dir: ./artifacts/data

# At least one source required. Each source contributes a slice;
# the orchestrator emits one combined deduped dataset.
sources:
  - name: eagle3-sharegpt
    type: sharegpt
    hf_dataset_id: yuhuili/EAGLE3-LLaMA3.1-Instruct-8B
    max_examples: 70000
    domain: general
  - name: openhermes-subset
    type: openhermes
    hf_dataset_id: teknium/OpenHermes-2.5
    max_examples: 30000
    domain: general
  # Finance slice (local JSONL, opt-in): uncomment and point `path` at a
  # local Q&A JSONL (or supply hf_dataset_id for FinOpsGym if/when
  # published). Disabled by default — the file is not part of the repo, and
  # a fresh clone must run `python -m data.prepare` without edits (the EDGAR
  # source below provides the finance domain out of the box).
  # - name: finance-qa
  #   type: finance
  #   path: ./data/finance/finance_qa.jsonl
  #   max_examples: 10000
  #   domain: finance
  # Finance slice (SEC EDGAR fallback): pulls XBRL company-facts JSON for a
  # default set of 8 large-cap issuers (Apple, Microsoft, Amazon, NVIDIA,
  # IBM, 3M, Wells Fargo, Pfizer). Override `ciks` to narrow the sweep or
  # pass `path` to replay from a local JSONL cache (offline mode).
  - name: edgar-finance
    type: edgar
    max_examples: 5000
    domain: finance
    ciks:
      - 0000320193   # Apple
      - 0000789019   # Microsoft
      - 0001018724   # Amazon
      - 0001045810   # NVIDIA
    user_agent: "DraftForge/0.1 (research; contact@example.com)"

dedup:
  method: exact+minhash    # exact first, then minhash near-dup
  minhash_threshold: 0.85
  num_perm: 128

split:
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  stratify_by: domain

tokenizer:
  name_or_path: Qwen/Qwen3-4B-Instruct-2507
  max_length: 4096
  trust_remote_code: false
