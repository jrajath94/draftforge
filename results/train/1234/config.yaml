model:
  name_or_path: Qwen/Qwen3-4B-Instruct-2507
  torch_dtype: bfloat16
  attn_impl: sdpa
dataset:
  train_dir: artifacts/data/tokenized/train
  val_dir: artifacts/data/tokenized/val
  max_length: 4096
  text_field: text
eagle3:
  layer_indices:
  - 7
  - 18
  - 29
  num_decoder_layers: 1
  head_dim: null
optimizer:
  name: adamw
  lr: 0.0001
  betas:
  - 0.9
  - 0.95
  weight_decay: 0.1
  warmup_steps: 100
training:
  seed: 1234
  max_steps: 2000
  per_device_batch_size: 1
  grad_accum: 8
  log_every: 10
  eval_every: 200
  save_every: 500
  bf16: true
  gradient_checkpointing: true
  training_time_test_every: 100
  training_time_test_horizon: 5
  sequence_pack: false
  sequence_pack_max_len: 4096
ds:
  config_path: train/ds_config.json
  num_gpus: 1
  mixed_precision: bf16
output:
  dir: results/train/1234
  save_every: 500
  keep_last_n_checkpoints: 2
